<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CollabHub</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="navbar">
  <div class="logo">CollabHub</div>
  <nav>
    <button id="btn-show-login">Login</button>
    <button id="btn-show-register">Register</button>
    <button id="btn-logout" class="hidden">Logout</button>
  </nav>
</header>

<section class="hero">
  <h1>Build Projects Across Departments</h1>
  <p>Discover teammates, recruit talent, and collaborate on innovative student projects.</p>
</section>

<main>
<section class="card">
<div id="login-form" class="hidden auth-box">
<h2>Login</h2>
<input id="login-email" placeholder="Email">
<input id="login-pass" type="password" placeholder="Password">
<button id="btn-login">Login</button>
</div>

<div id="register-form" class="hidden auth-box">
<h2>Register</h2>
<input id="reg-name" placeholder="Name">
<input id="reg-email" placeholder="Email">
<input id="reg-dept" placeholder="Department">
<input id="reg-skills" placeholder="Skills">
<input id="reg-pass" type="password" placeholder="Password">
<button id="btn-register">Register</button>
</div>
</section>

<section class="stats">
<div><h2>500+</h2><p>Projects</p></div>
<div><h2>1200+</h2><p>Students</p></div>
<div><h2>8+</h2><p>Departments</p></div>
</section>

<section id="create-panel" class="card hidden">
<h2>Create Project</h2>
<input id="post-title" placeholder="Project Title">
<textarea id="post-desc" placeholder="Description"></textarea>
<input id="post-skills" placeholder="Skills Needed">
<button id="btn-create">Create Project</button>
</section>

<section class="card">
<h2>Project Marketplace</h2>
<div id="dept-filter"></div>
<div id="posts-list"></div>
</section>

<section class="card">
<h2>Your Profile</h2>
<div id="profile-info"></div>
<h3>Your Projects</h3>
<div id="profile-posts"></div>
<h3>Joined Projects</h3>
<div id="profile-joined"></div>
</section>
</main>

<script type="module" src="script.js"></script>
</body>
</html>
